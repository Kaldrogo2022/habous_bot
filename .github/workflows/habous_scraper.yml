name: Habous Scraper Bot

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  run-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 urllib3

      - name: Run Scraper Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python habous_bot.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          # إنشاء الملف في حال لم ينشئه السكريبت لتجنب الفشل
          if [ ! -f seen_habous_ads.json ]; then echo "[]" > seen_habous_ads.json; fi
          git add seen_habous_ads.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "تحديث الإعلانات" && git push)
          
